services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quick-fastapi-medium-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-quick_fastapi_medium}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${APP_HOST_PORT:-8001}:8000"
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:16-alpine
    container_name: quick-fastapi-medium-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quick_fastapi_medium}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quick_fastapi_medium}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quick-fastapi-medium-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

volumes:
  postgres_data:
