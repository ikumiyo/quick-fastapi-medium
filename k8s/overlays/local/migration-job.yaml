apiVersion: batch/v1
kind: Job
metadata:
  name: quick-fastapi-medium-migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: quick-fastapi-medium-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: quick-fastapi-medium-secret
                  key: POSTGRES_USER
          command:
            - sh
            - -c
            - until pg_isready -h quick-fastapi-medium-postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo "waiting for postgres"; sleep 2; done
      containers:
        - name: migrate
          image: quick-fastapi-medium:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: quick-fastapi-medium-config
            - secretRef:
                name: quick-fastapi-medium-secret
          command: ["uv", "run", "alembic", "upgrade", "head"]
