services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quick-fastapi-medium-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-quick_fastapi_medium}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${APP_HOST_PORT:-8001}:8000"
    volumes:
      - ..:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  redis:
    image: redis:7-alpine
    container_name: quick-fastapi-medium-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
