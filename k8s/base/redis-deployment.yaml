apiVersion: apps/v1
kind: Deployment
metadata:
  name: quick-fastapi-medium-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quick-fastapi-medium-redis
  template:
    metadata:
      labels:
        app: quick-fastapi-medium-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
